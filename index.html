<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webmap Template</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <aside id="sidebar">
    <header id="sidebar-header">
      <h1 id="map-title">Webmap Template</h1>
      <p id="map-subtitle">Load a GeoJSON file from the data folder and customize popups in app.js.</p>
    </header>

    <section class="panel">
      <h2>Features</h2>
      <input id="feature-search" type="text" placeholder="Search features..." aria-label="Search features">
      <div id="feature-list" aria-live="polite"></div>
      <p id="feature-count" class="muted"></p>
    </section>

    <section class="panel field-panel">
      <h2>Available Fields</h2>
      <p class="muted">Auto-detected from the loaded GeoJSON properties.</p>
      <div id="field-list" aria-live="polite"></div>
      <p id="field-count" class="muted"></p>
    </section>
  </aside>

  <main id="map" aria-label="Map"></main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./app.js"></script>
</body>
</html>
